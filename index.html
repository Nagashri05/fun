<!DOCTYPE html>
<html>
<head>
  <title>Mind Reader</title>
  <style>
    body {
      background: #0d0d0d;
      color: #fff;
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
    }

    #box {
      max-width: 500px;
      margin: auto;
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      margin-top: 20px;
      cursor: pointer;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 5px;
    }

    .loader {
      margin-top: 20px;
      font-size: 18px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0% { opacity: 0.3; }
      50% { opacity: 1; }  
      100% { opacity: 0.3; }
    }

    .glitch {
      font-size: 28px;
      animation: glitch 0.4s infinite;
    }

    @keyframes glitch {
      0% { text-shadow: 2px 2px red; }
      25% { text-shadow: -2px 2px blue; }
      50% { text-shadow: 2px -2px lime; }
      75% { text-shadow: -2px -2px cyan; }
      100% { text-shadow: 2px 2px red; }
    }

    .brand {
      margin-top: 25px;
      font-size: 20px;
      letter-spacing: 2px;
      color: #00ffcc;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.6s ease;
    }

    .showBrand {
      opacity: 1;
      transform: translateY(0);
    }

    .small {
      font-size: 12px;
      opacity: 0.6;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div id="box">
  <h1>🔮 Mind Reader</h1>
  <p id="text">I can read your mind. Think I'm joking?</p>
  <button onclick="nextStep()">Start</button>

  <div id="brand" class="brand">buglife404zone</div>
  <div id="follow" class="small"></div>
</div>

<!-- ✅ AUDIO (ONLY ONCE) -->
<audio id="clickSound" preload="auto" src="https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3"></audio>
<audio id="typeSound" preload="auto" src="https://assets.mixkit.co/sfx/preview/mixkit-typing-on-keyboard-1366.mp3"></audio>
<audio id="revealSound" preload="auto" src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-retro-jump-223.mp3"></audio>

<script>
let step = 0;

const clickSound = document.getElementById("clickSound");
const typeSound = document.getElementById("typeSound");
const revealSound = document.getElementById("revealSound");

// 🔓 unlock audio on first click
window.addEventListener("click", () => {
  clickSound.play().catch(() => {});
  typeSound.play().catch(() => {});
  revealSound.play().catch(() => {});
}, { once: true });

function play(sound) {
  if (!sound) return;
  sound.currentTime = 0;
  sound.play().catch(() => {});
}

function nextStep() {
  const text = document.getElementById("text");

  play(clickSound);
  step++;

  function updateText(message) {
    play(typeSound);
    text.innerText = message;
  }

  if (step === 1) updateText("Think of any number between 1 and 100.");
  else if (step === 2) updateText("Multiply it by 2.");
  else if (step === 3) updateText("Add 10 to the result.");
  else if (step === 4) updateText("Now divide it by 2.");
  else if (step === 5) updateText("Finally, subtract your original number.");
  else if (step === 6) {
    text.innerHTML = "<div class='loader'>Analyzing brainwaves...</div>";
    setTimeout(reveal, 2500);
  }
}

function reveal() {
  const text = document.getElementById("text");
  const brand = document.getElementById("brand");
  const follow = document.getElementById("follow");

  play(revealSound);

  text.innerHTML = "<span class='glitch'>You're thinking of... 5 😏</span>";

  setTimeout(() => {
    text.innerText = "Wait... that's not important.";
    play(typeSound);
  }, 2000);

  setTimeout(() => {
    text.innerText = "I wasn't reading your mind...";
    play(typeSound);
  }, 3500);

  setTimeout(() => {
    text.innerText = "I was planting a thought.";
    play(typeSound);
  }, 5000);

  setTimeout(() => {
    play(revealSound);
    text.innerHTML = "<span class='glitch'>buglife404zone</span>";
    brand.classList.add("showBrand");
    follow.innerText = "Follow for more weird web stuff 👀";
  }, 6500);
}
</script>

</body>
</html>
