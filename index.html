<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiply by 11 Trick &#128293;</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090b12;
      --panel: rgba(17, 22, 34, 0.86);
      --panel-strong: rgba(24, 31, 48, 0.94);
      --text: #f7f8ff;
      --muted: #9aa4bd;
      --line: rgba(255, 255, 255, 0.13);
      --yellow: #ffd166;
      --pink: #ff5ea8;
      --cyan: #4ce6d2;
      --blue: #6aa8ff;
      --green: #8aff80;
      --danger: #ff7a7a;
      --shadow: 0 28px 80px rgba(0, 0, 0, 0.38);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 28px 16px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 16% 18%, rgba(255, 94, 168, 0.22), transparent 28%),
        radial-gradient(circle at 84% 12%, rgba(76, 230, 210, 0.2), transparent 24%),
        linear-gradient(135deg, #070811 0%, #12182a 54%, #080a12 100%);
    }

    main {
      width: min(100%, 720px);
    }

    .app {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(145deg, var(--panel), var(--panel-strong));
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .hero {
      padding: clamp(28px, 7vw, 48px) clamp(20px, 6vw, 44px) 22px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.35rem, 9vw, 5.1rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 520px;
      margin: 16px auto 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.5vw, 1.18rem);
    }

    .calculator {
      padding: 0 clamp(16px, 5vw, 36px) clamp(22px, 5vw, 36px);
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.055);
    }

    input {
      width: 100%;
      min-height: 58px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      outline: none;
      padding: 0 18px;
      color: var(--text);
      background: rgba(5, 7, 13, 0.72);
      font: 900 clamp(1.4rem, 6vw, 2.4rem) / 1 Inter, system-ui, sans-serif;
      text-align: center;
      letter-spacing: 0;
      transition: border-color 180ms ease, box-shadow 180ms ease;
    }

    input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 4px rgba(76, 230, 210, 0.14);
    }

    button {
      border: 0;
      border-radius: 8px;
      color: #071016;
      background: linear-gradient(135deg, var(--yellow), var(--pink));
      font-weight: 900;
      cursor: pointer;
      transition: transform 180ms ease, filter 180ms ease, box-shadow 180ms ease;
      box-shadow: 0 12px 28px rgba(255, 94, 168, 0.22);
    }

    button:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
      box-shadow: 0 18px 34px rgba(255, 94, 168, 0.28);
    }

    button:active {
      transform: translateY(0) scale(0.99);
    }

    .calculate {
      min-height: 58px;
      padding: 0 22px;
      font-size: 1.02rem;
      white-space: nowrap;
    }

    .examples {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin: 18px 0 0;
      color: var(--muted);
      font-weight: 700;
    }

    .example-chip {
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 999px;
      padding: 7px 11px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      cursor: pointer;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .example-chip:hover {
      transform: translateY(-2px);
      border-color: rgba(76, 230, 210, 0.38);
      background: rgba(76, 230, 210, 0.1);
    }

    .message {
      min-height: 24px;
      margin: 14px 0 0;
      color: var(--danger);
      text-align: center;
      font-weight: 800;
    }

    .steps {
      margin-top: 20px;
      min-height: 188px;
      display: grid;
      align-items: center;
    }

    .step {
      display: none;
      gap: 8px;
      padding: 18px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.055);
      opacity: 0;
      transform: translateY(22px) scale(0.92);
    }

    .step.show {
      display: grid;
      border-color: rgba(76, 230, 210, 0.36);
      animation: cardPop 520ms cubic-bezier(0.2, 1.2, 0.32, 1) forwards;
    }

    .step.hide {
      display: grid;
      animation: cardExit 380ms ease forwards;
    }

    .step-label {
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .math-line {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      min-height: 74px;
      font-size: clamp(1.45rem, 8vw, 3.3rem);
      font-weight: 950;
      line-height: 1;
      text-align: center;
    }

    .digit,
    .symbol {
      display: inline-grid;
      place-items: center;
      min-width: clamp(48px, 16vw, 82px);
      min-height: clamp(48px, 16vw, 82px);
      padding: 8px;
      border-radius: 8px;
      color: #071016;
      background: var(--cyan);
      box-shadow: inset 0 -10px 24px rgba(0, 0, 0, 0.13);
      animation: pop 520ms cubic-bezier(0.2, 1.35, 0.32, 1) both;
      animation-delay: var(--delay, 0ms);
    }

    .digit.first {
      background: var(--yellow);
    }

    .digit.middle {
      background: var(--pink);
      color: #fff;
    }

    .digit.last {
      background: var(--blue);
      color: #fff;
    }

    .symbol {
      min-width: auto;
      color: var(--text);
      background: transparent;
      box-shadow: none;
    }

    .carry-note {
      color: var(--green);
      font-size: clamp(1rem, 3.4vw, 1.25rem);
      font-weight: 850;
      text-align: center;
    }

    .answer {
      display: none;
      padding: 20px;
      border: 1px solid rgba(138, 255, 128, 0.36);
      border-radius: 8px;
      background: rgba(138, 255, 128, 0.075);
      text-align: center;
    }

    .answer.show {
      display: block;
      animation: answerPop 560ms cubic-bezier(0.2, 1.2, 0.32, 1) both;
    }

    .answer-label {
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .final-number {
      margin-top: 4px;
      font-size: clamp(3.8rem, 18vw, 7.8rem);
      line-height: 0.95;
      font-weight: 1000;
      color: var(--green);
      text-shadow: 0 0 28px rgba(138, 255, 128, 0.25);
    }

    .try-again {
      display: none;
      width: 100%;
      min-height: 54px;
      margin-top: 14px;
      font-size: 1rem;
      color: var(--text);
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow: none;
    }

    .try-again.show {
      display: block;
      animation: buttonPop 420ms ease both;
    }

    @keyframes cardPop {
      0% {
        opacity: 0;
        transform: translateY(22px) scale(0.92);
      }
      70% {
        opacity: 1;
        transform: translateY(-4px) scale(1.015);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes pop {
      0% {
        opacity: 0;
        transform: translateY(16px) scale(0.65) rotate(-2deg);
      }
      75% {
        opacity: 1;
        transform: translateY(-5px) scale(1.08) rotate(1deg);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1) rotate(0);
      }
    }

    @keyframes cardExit {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translateY(-18px) scale(0.94);
      }
    }

    @keyframes answerPop {
      0% {
        opacity: 0;
        transform: translateY(22px) scale(0.9);
      }
      70% {
        opacity: 1;
        transform: translateY(-4px) scale(1.02);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes buttonPop {
      0% {
        opacity: 0;
        transform: translateY(12px) scale(0.96);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 560px) {
      body {
        padding: 14px;
      }

      .hero {
        padding-top: 30px;
      }

      .input-row {
        grid-template-columns: 1fr;
      }

      .calculate {
        width: 100%;
      }

      .step {
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="app" aria-label="Multiply by 11 trick calculator">
      <div class="hero">
        <h1>Multiply by 11 Trick &#128293;</h1>
        <p class="subtitle">Enter any 2-digit number and watch the quick mental math trick unfold step by step.</p>
      </div>

      <div class="calculator">
        <form class="input-row" id="trickForm">
          <input
            id="numberInput"
            type="number"
            min="10"
            max="99"
            inputmode="numeric"
            placeholder="23"
            aria-label="Enter a 2-digit number"
            autocomplete="off"
          >
          <button class="calculate" type="submit">Calculate</button>
        </form>

        <div class="examples" aria-label="Examples">
          <span>Try</span>
          <span class="example-chip">23</span>
          <span class="example-chip">54</span>
          <span class="example-chip">99</span>
        </div>

        <p class="message" id="message" role="status"></p>

        <div class="steps" id="stage" aria-live="polite">
          <div class="step" id="step1">
            <span class="step-label">Step 1: Split digits</span>
            <div class="math-line" id="splitLine"></div>
          </div>
          <div class="step" id="step2">
            <span class="step-label">Step 2: Add digits</span>
            <div class="math-line" id="addLine"></div>
            <div class="carry-note" id="carryNote"></div>
          </div>
          <div class="step" id="step3">
            <span class="step-label">Step 3: Form result</span>
            <div class="math-line" id="resultLine"></div>
          </div>

          <div class="answer" id="answerBox">
            <div class="answer-label">Final Answer</div>
            <div class="final-number" id="finalAnswer">253</div>
          </div>
        </div>

        <button class="try-again" id="tryAgain" type="button">Try another number</button>
      </div>
    </section>
  </main>

  <script>
    const form = document.getElementById("trickForm");
    const input = document.getElementById("numberInput");
    const message = document.getElementById("message");
    const steps = [...document.querySelectorAll(".step")];
    const splitLine = document.getElementById("splitLine");
    const addLine = document.getElementById("addLine");
    const carryNote = document.getElementById("carryNote");
    const resultLine = document.getElementById("resultLine");
    const answerBox = document.getElementById("answerBox");
    const finalAnswer = document.getElementById("finalAnswer");
    const tryAgain = document.getElementById("tryAgain");
    const exampleChips = document.querySelectorAll(".example-chip");

    let timers = [];

    function clearTimers() {
      timers.forEach((timer) => clearTimeout(timer));
      timers = [];
    }

    function resetDisplay() {
      clearTimers();
      message.textContent = "";
      steps.forEach((step) => step.classList.remove("show", "hide"));
      splitLine.innerHTML = "";
      addLine.innerHTML = "";
      carryNote.textContent = "";
      resultLine.innerHTML = "";
      answerBox.classList.remove("show");
      tryAgain.classList.remove("show");
    }

    function token(value, className = "", delay = 0) {
      return `<span class="${className}" style="--delay: ${delay}ms">${value}</span>`;
    }

    function digit(value, className = "", delay = 0) {
      return token(value, `digit ${className}`, delay);
    }

    function symbol(value, delay = 0) {
      return token(value, "symbol", delay);
    }

    function calculateByEleven(value) {
      const tens = Math.floor(value / 10);
      const ones = value % 10;
      const sum = tens + ones;
      const carry = Math.floor(sum / 10);
      const middle = sum % 10;
      const hundreds = tens + carry;
      const result = hundreds * 100 + middle * 10 + ones;

      return { tens, ones, sum, carry, middle, hundreds, result };
    }

    function runAnimation(value) {
      const math = calculateByEleven(value);
      resetDisplay();

      function showStep(index) {
        steps[index].classList.remove("hide");
        steps[index].classList.add("show");
      }

      function hideStep(index) {
        steps[index].classList.remove("show");
        steps[index].classList.add("hide");

        timers.push(setTimeout(() => {
          steps[index].classList.remove("hide");
        }, 390));
      }

      timers.push(setTimeout(() => {
        splitLine.innerHTML = [
          digit(math.tens, "first", 80),
          symbol("and", 210),
          digit(math.ones, "last", 340)
        ].join("");
        showStep(0);
      }, 120));

      timers.push(setTimeout(() => {
        hideStep(0);
      }, 1450));

      timers.push(setTimeout(() => {
        addLine.innerHTML = [
          digit(math.tens, "first", 80),
          symbol("+", 190),
          digit(math.ones, "last", 300),
          symbol("=", 410),
          digit(math.sum, "middle", 520)
        ].join("");

        if (math.carry > 0) {
          carryNote.textContent = `${math.sum} has a carry, so add ${math.carry} to the first digit.`;
        }

        showStep(1);
      }, 1850));

      timers.push(setTimeout(() => {
        hideStep(1);
      }, 3300));

      timers.push(setTimeout(() => {
        resultLine.innerHTML = [
          digit(math.hundreds, "first", 80),
          digit(math.middle, "middle", 260),
          digit(math.ones, "last", 440)
        ].join("");
        showStep(2);
      }, 3700));

      timers.push(setTimeout(() => {
        hideStep(2);
      }, 5150));

      timers.push(setTimeout(() => {
        finalAnswer.textContent = math.result;
        answerBox.classList.add("show");
      }, 5550));

      timers.push(setTimeout(() => {
        tryAgain.classList.add("show");
      }, 6150));
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const rawValue = input.value.trim();
      const value = Number(rawValue);

      if (!/^\d{2}$/.test(rawValue) || value < 10 || value > 99) {
        resetDisplay();
        message.textContent = "Please enter exactly one 2-digit number.";
        input.focus();
        return;
      }

      runAnimation(value);
    });

    tryAgain.addEventListener("click", () => {
      resetDisplay();
      input.value = "";
      input.focus();
    });

    exampleChips.forEach((chip) => {
      chip.addEventListener("click", () => {
        input.value = chip.textContent;
        runAnimation(Number(chip.textContent));
      });
    });

    input.addEventListener("input", () => {
      if (input.value.length > 2) {
        input.value = input.value.slice(0, 2);
      }
    });
  </script>
</body>
</html>
